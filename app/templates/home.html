<!DOCTYPE html>
<html>
<head>
    <title>Clustering App</title>
</head>
<body>

<h2>Clustering App</h2>

<!-- ================= RUN ================= -->
<h3>Run Clustering</h3>

<form id="runForm">
    Dataset:
    <select id="datasetSelect" name="dataset_id"></select>
    <br><br>

    K: <input name="k" value="8">
    <br><br>

    <button type="submit">Run</button>
</form>

<p id="runMsg"></p>

<hr>

<!-- ================= DATASETS ================= -->
<h3>Datasets</h3>
<ul id="datasets"></ul>

<hr>

<!-- ================= UPLOAD ================= -->
<h3>Upload Dataset (ZIP)</h3>

<form id="uploadForm">
    Name: <input name="name" required><br><br>
    File: <input type="file" name="file" required><br><br>
    <button type="submit">Upload</button>
</form>

<p id="uploadMsg"></p>

<hr>

<!-- ================= LINKS ================= -->
<h3>Results</h3>
<a href="/metrics" target="_blank">Metrics</a><br>
<a href="/clusters" target="_blank">Clusters</a><br>
<a href="/distribution" target="_blank">Distribution</a><br>
<a href="/compare" target="_blank">Compare</a><br>

<!-- ================= SCRIPT ================= -->
<script>
// ---------------- LOAD DATASETS ----------------
async function loadDatasets() {
    const res = await fetch('/datasets');
    const data = await res.json();

    const ul = document.getElementById('datasets');
    const select = document.getElementById('datasetSelect');

    ul.innerHTML = "";
    select.innerHTML = "";

    data.forEach(d => {
        // list
        const li = document.createElement('li');

        li.innerText = `${d.id}: ${d.name} `;

        const btn = document.createElement('button');
        btn.innerText = "Delete";

        btn.onclick = async () => {
            if (!confirm("Delete this dataset?")) return;

            const res = await fetch(`/datasets/${d.id}`, {
                method: "DELETE"
            });

            const data = await res.json();
            alert(data.message || data.error);

            loadDatasets();
        };

        li.appendChild(btn);
        ul.appendChild(li);

        // dropdown
        const option = document.createElement('option');
        option.value = d.id;
        option.innerText = `${d.name}`;
        select.appendChild(option);
    });
}

// ---------------- RUN ----------------
document.getElementById("runForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const form = new FormData(e.target);

    const res = await fetch("/run", {
        method: "POST",
        body: form
    });

    const data = await res.json();

    document.getElementById("runMsg").innerText =
        data.message || data.error;
});

// ---------------- UPLOAD ----------------
document.getElementById("uploadForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const form = new FormData(e.target);

    const res = await fetch("/datasets/upload", {
        method: "POST",
        body: form
    });

    const data = await res.json();

    document.getElementById("uploadMsg").innerText =
        data.message || data.error;

    loadDatasets();
});

// initial load
loadDatasets();
</script>

</body>
</html>
